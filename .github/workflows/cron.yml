name: Mess App Cron Job

on:
  schedule:
    - cron: '* * * * *' # টেস্ট করার জন্য প্রতি মিনিটে সেট করলাম
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Vercel API
        run: curl -X POST "https://amadermess.vercel.app/api/sendPush" -H "Content-Length: 0"